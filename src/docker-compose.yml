services:
  menudb:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=MenuSnapDb
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - menudb_data:/var/lib/postgresql/data

  distributedcache:
    image: redis:7-alpine
    restart: unless-stopped

  messagebus:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  identity:
    image: quay.io/keycloak/keycloak:26.1
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://menudb:5432/MenuSnapDb
      - KC_DB_SCHEMA=identity
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev
    depends_on:
      - menudb
    restart: unless-stopped
    ports:
      - "9090:8080"

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
    restart: unless-stopped
    ports:
      - "5341:5341"
      - "9091:80"
    volumes:
      - seq_data:/data

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: menusnap-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - menudb
      - distributedcache
      - messagebus
      - identity
      - minio
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  menudb_data:
  seq_data:
  minio_data:
